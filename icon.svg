<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2c1e0f"/>
      <stop offset="100%" stop-color="#0d0906"/>
    </radialGradient>
    <radialGradient id="flame" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="1"/>
      <stop offset="30%" stop-color="#f0c040" stop-opacity="1"/>
      <stop offset="70%" stop-color="#c4880a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8a3800" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4880a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="candle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a1a04"/>
      <stop offset="30%" stop-color="#c4880a" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#f0e8c8"/>
      <stop offset="70%" stop-color="#c4880a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2c1005"/>
    </linearGradient>
    <linearGradient id="gold-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="50%" stop-color="#c4880a"/>
      <stop offset="100%" stop-color="#e8b840"/>
    </linearGradient>
    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Gold ring border -->
  <rect x="16" y="16" width="480" height="480" rx="100" fill="none" stroke="url(#gold-ring)" stroke-width="3" opacity="0.5"/>

  <!-- Glow behind flame -->
  <ellipse cx="256" cy="170" rx="110" ry="120" fill="url(#glow)" filter="url(#blur-glow)"/>

  <!-- Flame outer glow -->
  <ellipse cx="256" cy="148" rx="36" ry="52" fill="#c4880a" opacity="0.18" filter="url(#blur-glow)"/>

  <!-- Flame -->
  <path d="M256 82 C256 82 228 110 226 138 C224 162 238 175 248 178 C243 165 245 152 256 142 C267 152 269 165 264 178 C274 175 288 162 286 138 C284 110 256 82 256 82Z" fill="url(#flame)"/>

  <!-- Inner flame highlight -->
  <path d="M256 104 C256 104 244 120 243 138 C242 150 249 158 254 160 C251 152 252 143 256 137 C260 143 261 152 258 160 C263 158 270 150 269 138 C268 120 256 104 256 104Z" fill="#fff8e0" opacity="0.8"/>

  <!-- Wick -->
  <line x1="256" y1="178" x2="256" y2="196" stroke="#3a1a04" stroke-width="4" stroke-linecap="round"/>

  <!-- Candle body -->
  <rect x="214" y="196" width="84" height="168" rx="6" fill="url(#candle)"/>

  <!-- Candle wax drip -->
  <path d="M214 220 Q207 228 210 238 Q213 248 214 258" fill="none" stroke="#f0e8c8" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M298 234 Q305 242 303 252" fill="none" stroke="#f0e8c8" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

  <!-- Candle shine stripe -->
  <rect x="240" y="200" width="14" height="158" rx="7" fill="white" opacity="0.07"/>

  <!-- Base plate -->
  <rect x="196" y="362" width="120" height="14" rx="7" fill="#8a5c1a" opacity="0.7"/>
  <rect x="188" y="372" width="136" height="8" rx="4" fill="#6a4010" opacity="0.5"/>

  <!-- Decorative cross lines (subtle) -->
  <line x1="256" y1="400" x2="256" y2="440" stroke="#c4880a" stroke-width="1.5" opacity="0.3"/>
  <line x1="236" y1="420" x2="276" y2="420" stroke="#c4880a" stroke-width="1.5" opacity="0.3"/>

  <!-- Corner ornaments -->
  <text x="60" y="92" font-size="28" opacity="0.18" fill="#c4880a" font-family="serif">✦</text>
  <text x="424" y="92" font-size="28" opacity="0.18" fill="#c4880a" font-family="serif">✦</text>
  <text x="60" y="462" font-size="28" opacity="0.18" fill="#c4880a" font-family="serif">✦</text>
  <text x="424" y="462" font-size="28" opacity="0.18" fill="#c4880a" font-family="serif">✦</text>
</svg>
